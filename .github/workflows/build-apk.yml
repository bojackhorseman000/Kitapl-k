name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check index.html
        run: |
          if [ ! -f index.html ]; then
            echo "HATA: Repo kökünde index.html bulunamadı."
            echo "HTML dosyanın adını index.html yapıp repo köküne yükle."
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/mete/mediaklasoru
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          cp index.html app/src/main/assets/index.html

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "MedyaKlasoru"
          include(":app")
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id("com.android.application")
          }

          android {
              namespace = "com.mete.mediaklasoru"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.mete.mediaklasoru"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="Medya Klasörü"
                  android:roundIcon="@drawable/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#050506</item>
                  <item name="android:navigationBarColor">#050506</item>
                  <item name="android:windowBackground">#050506</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#050506" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#9BE15D" android:fillAlpha="0.95" android:pathData="M20,28a12,12 0,0 1,12 -12h44a12,12 0,0 1,12 12v52a12,12 0,0 1,-12 12h-44a12,12 0,0 1,-12 -12z"/>
              <path android:fillColor="#38BDF8" android:fillAlpha="0.82" android:pathData="M22,32a14,14 0,0 1,14 -14h18v72h-18a14,14 0,0 1,-14 -14z"/>
              <path android:fillColor="#C084FC" android:fillAlpha="0.78" android:pathData="M54,18h18a14,14 0,0 1,14 14v44a14,14 0,0 1,-14 14h-18z"/>
              <path android:fillColor="#FFFFFF" android:fillAlpha="0.88" android:pathData="M36,38h36v6h-36zM36,52h30v6h-30zM36,66h22v6h-22z"/>
          </vector>
          EOF

          cat > app/src/main/java/com/mete/mediaklasoru/MainActivity.java <<'EOF'
          package com.mete.mediaklasoru;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;
              private ValueCallback<Uri[]> filePathCallback;
              private static final int FILE_CHOOSER_REQUEST = 1001;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);

                  webView = new WebView(this);
                  webView.setSystemUiVisibility(View.SYSTEM_UI_FLAG_LAYOUT_STABLE | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);

                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, FileChooserParams fileChooserParams) {
                          if (MainActivity.this.filePathCallback != null) {
                              MainActivity.this.filePathCallback.onReceiveValue(null);
                          }

                          MainActivity.this.filePathCallback = filePathCallback;

                          try {
                              startActivityForResult(fileChooserParams.createIntent(), FILE_CHOOSER_REQUEST);
                          } catch (Exception e) {
                              MainActivity.this.filePathCallback = null;
                              return false;
                          }

                          return true;
                      }
                  });

                  if (savedInstanceState == null) {
                      webView.loadUrl("file:///android_asset/index.html");
                  } else {
                      webView.restoreState(savedInstanceState);
                  }
              }

              @Override
              protected void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  webView.saveState(outState);
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);

                  if (requestCode == FILE_CHOOSER_REQUEST && filePathCallback != null) {
                      Uri[] results = null;

                      if (resultCode == RESULT_OK && data != null) {
                          if (data.getClipData() != null) {
                              int count = data.getClipData().getItemCount();
                              results = new Uri[count];

                              for (int i = 0; i < count; i++) {
                                  results[i] = data.getClipData().getItemAt(i).getUri();
                              }
                          } else if (data.getData() != null) {
                              results = new Uri[]{data.getData()};
                          }
                      }

                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
              }
          }
          EOF

      - name: Build debug APK
        run: ./gradlew assembleDebug || gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medya-klasoru-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
